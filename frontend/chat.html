<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Medicare+ · Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
.chat-layout{display:grid;grid-template-columns:270px 1fr;gap:16px;height:calc(100vh - 180px);min-height:500px}
.convo-list{background:#fff;border:1px solid var(--border);border-radius:12px;overflow-y:auto;display:flex;flex-direction:column}
.convo-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px;flex-shrink:0}
.convo-item:hover{background:var(--bg)}
.convo-item.active{background:var(--teal-50);border-left:3px solid var(--teal)}
.convo-av{width:38px;height:38px;border-radius:50%;background:var(--teal-pale);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--teal-dk);flex-shrink:0}
.convo-name{font-weight:600;font-size:13.5px;color:var(--navy)}
.convo-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;max-width:160px}
.unread-badge{background:var(--teal);color:#fff;border-radius:99px;font-size:11px;padding:1px 7px;font-weight:700;flex-shrink:0}
.chat-window{background:#fff;border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:#fff;flex-shrink:0}
.chat-header-av{width:38px;height:38px;border-radius:50%;background:var(--teal-pale);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--teal-dk)}
.chat-header-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--navy)}
.chat-header-status{font-size:11.5px;color:var(--teal);margin-top:1px}
.online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;background:#fafafa}
.msg-wrap{display:flex;flex-direction:column}
.msg-wrap.mine{align-items:flex-end}
.msg-wrap.other{align-items:flex-start}
.msg-bubble{max-width:65%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;word-break:break-word}
.msg-bubble.mine{background:var(--teal);color:#fff;border-bottom-right-radius:4px}
.msg-bubble.other{background:#fff;color:var(--navy);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-time{font-size:11px;color:var(--muted);margin-top:4px;padding:0 2px}
.chat-input-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;background:#fff;flex-shrink:0}
.chat-input{flex:1;padding:10px 16px;border:1.5px solid var(--border);border-radius:99px;font-size:13.5px;font-family:inherit;outline:none;background:#fafafa;color:var(--navy);transition:border .15s}
.chat-input:focus{border-color:var(--teal);background:#fff}
.chat-input::placeholder{color:#cbd5e1}
.btn-send{padding:10px 18px;background:var(--teal);color:#fff;border:none;border-radius:99px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap}
.btn-send:hover{background:var(--teal-dk)}
.no-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:8px}
.empty-convo{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main page-enter">
    <div class="page-hero">
      <h1>Messages</h1>
      <p>Chat securely with your doctor or patients</p>
      <div class="page-hero-actions">
        <button class="btn btn-soft btn-sm" onclick="openModal('new-chat-modal')">+ New conversation</button>
      </div>
    </div>

    <div class="chat-layout">
      <!-- Conversations list -->
      <div class="convo-list" id="convo-list">
        <div class="empty-convo"><div style="font-size:32px;margin-bottom:8px">💬</div><div style="font-size:13px">Loading...</div></div>
      </div>

      <!-- Chat window -->
      <div class="chat-window" id="chat-window">
        <div class="no-chat">
          <div style="font-size:48px;margin-bottom:10px">💬</div>
          <div style="font-weight:600;font-size:15px;color:var(--navy)">Select a conversation</div>
          <div style="font-size:13px;color:var(--muted);margin-top:4px">or start a new one above</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- New chat modal -->
<div class="modal-overlay" id="new-chat-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">New Conversation <button class="modal-close" onclick="closeModal('new-chat-modal')">×</button></div>
    <div class="form-group">
      <label class="form-label">Select person to message</label>
      <select class="form-select" id="nc-person"></select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('new-chat-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="startChat()">Start conversation</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
requireAuth();
buildSidebar('chat');
const me = getUser();
let currentPartner = null;
let currentPartnerName = '';
let pollInterval = null;

// ── LOAD CONVERSATIONS ──
async function loadConversations() {
  try {
    const convos = await apiFetch('/chat/conversations');
    const list = document.getElementById('convo-list');
    if (!convos.length) {
      list.innerHTML = `<div class="empty-convo"><div style="font-size:32px;margin-bottom:8px">💬</div><div style="font-size:13px;font-weight:600">No conversations yet</div><div style="font-size:12px;margin-top:4px">Click "+ New conversation" to start</div></div>`;
      return;
    }
    list.innerHTML = convos.map(c => `
      <div class="convo-item ${currentPartner===c.user.id?'active':''}" onclick="openChat(${c.user.id},'${escHtml(c.user.name)}')">
        <div class="convo-av">${(c.user.name||'U')[0].toUpperCase()}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span class="convo-name">${escHtml(c.user.name)}</span>
            ${c.unread_count ? `<span class="unread-badge">${c.unread_count}</span>` : ''}
          </div>
          <div class="convo-preview">${c.last_message ? escHtml(c.last_message.content.slice(0,45)) : 'Start chatting...'}</div>
        </div>
      </div>`).join('');
  } catch(e) { showToast('Failed to load conversations: ' + e.message, 'error'); }
}

// ── OPEN CHAT ──
async function openChat(userId, userName) {
  currentPartner = userId;
  currentPartnerName = userName;
  clearInterval(pollInterval);

  const win = document.getElementById('chat-window');
  win.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-av">${userName[0].toUpperCase()}</div>
      <div>
        <div class="chat-header-name">${escHtml(userName)}</div>
        <div class="chat-header-status"><span class="online-dot"></span>Online</div>
      </div>
    </div>
    <div class="chat-msgs" id="msgs-area"></div>
    <div class="chat-input-bar">
      <input class="chat-input" type="text" id="msg-input" placeholder="Type a message..." autocomplete="off"/>
      <button class="btn-send" id="send-btn">Send ➤</button>
    </div>`;

  // Attach send handlers after DOM update
  document.getElementById('send-btn').onclick = sendMsg;
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMsg();
  });

  await fetchMsgs();
  loadConversations();
  pollInterval = setInterval(fetchMsgs, 3000);
}

// ── FETCH MESSAGES ──
async function fetchMsgs() {
  if (!currentPartner) return;
  try {
    const msgs = await apiFetch(`/chat/messages/${currentPartner}`);
    const area = document.getElementById('msgs-area');
    if (!area) return;
    const atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;

    if (!msgs.length) {
      area.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:13px;padding:32px">Say hello to ${escHtml(currentPartnerName)}! 👋</div>`;
      return;
    }

    area.innerHTML = msgs.map(m => {
      const mine = m.sender_id === me.id;
      const time = new Date(m.created_at).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
      return `
        <div class="msg-wrap ${mine?'mine':'other'}">
          <div class="msg-bubble ${mine?'mine':'other'}">${escHtml(m.content)}</div>
          <div class="msg-time">${time}</div>
        </div>`;
    }).join('');

    if (atBottom) area.scrollTop = area.scrollHeight;
  } catch(e) {}
}

// ── SEND MESSAGE ──
async function sendMsg() {
  const input = document.getElementById('msg-input');
  if (!input) return;
  const content = input.value.trim();
  if (!content || !currentPartner) return;
  input.value = '';
  input.focus();
  try {
    await apiFetch('/chat/messages', {method:'POST', body:JSON.stringify({receiver_id: currentPartner, content})});
    await fetchMsgs();
    // Scroll to bottom after sending
    const area = document.getElementById('msgs-area');
    if (area) area.scrollTop = area.scrollHeight;
  } catch(e) { showToast('Failed to send: ' + e.message, 'error'); }
}

// ── NEW CHAT PEOPLE LIST ──
async function loadNewChatPeople() {
  try {
    let people;
    if (me.role === 'patient') {
      people = await apiFetch('/doctors/');
      document.getElementById('nc-person').innerHTML = people.map(d =>
        `<option value="${d.user_id}">${escHtml(d.name)} — ${escHtml(d.specialty)}</option>`
      ).join('');
    } else {
      people = await apiFetch('/doctors/patients');
      document.getElementById('nc-person').innerHTML = people.length
        ? people.map(p => `<option value="${p.id}">${escHtml(p.name)}</option>`).join('')
        : '<option value="">No patients yet</option>';
    }
  } catch(e) {}
}

function startChat() {
  const sel = document.getElementById('nc-person');
  const id = +sel.value;
  const name = sel.selectedOptions[0]?.text.split(' —')[0] || 'User';
  if (!id) return showToast('Please select a person', 'error');
  closeModal('new-chat-modal');
  openChat(id, name);
}

loadConversations();
loadNewChatPeople();
</script>
</body>
</html>
