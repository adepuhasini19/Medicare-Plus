<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Medicare+ · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main page-enter">
    <div class="page-hero">
      <h1 id="greeting" style="font-family:'Playfair Display',serif">Good morning</h1>
      <p>Here's your health overview for today</p>
      <div class="page-hero-actions"><div id="date-badge" style="font-size:12px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:6px 14px;border-radius:8px"></div></div>
    </div>
    <div class="stats-grid" id="stats"></div>
    <div class="grid-2" style="gap:20px">
      <div class="card">
        <div class="section-title">Upcoming appointments</div>
        <div id="upcoming-list"></div>
      </div>
      <div class="card" id="side-card">
        <div class="section-title" id="side-title">Medicine reminders</div>
        <div id="side-list"></div>
      </div>
    </div>
  </main>
</div>
<script src="shared.js"></script>
<script>
requireAuth();
buildSidebar('dashboard');
const user = getUser();
const h = new Date().getHours();
document.getElementById('greeting').textContent =
  (h<12?'Good morning ':h<17?'Good afternoon ':' Good evening ') + user.name.split(' ')[0] + ' 👋';
document.getElementById('date-badge').textContent =
  new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});

async function loadDashboard() {
  try {
    if (user.role === 'patient') {
      const [appts, reminders, reports, prescs] = await Promise.all([
        apiFetch('/appointments/'),
        apiFetch('/reminders/'),
        apiFetch('/reports/'),
        apiFetch('/prescriptions/')
      ]);
      const upcoming = appts.filter(a => a.status !== 'cancelled' && a.status !== 'completed');
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-icon" style="background:#F0FAF6">📅</div><div class="stat-num">${upcoming.length}</div><div class="stat-lbl">Appointments</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#EFF6FF">💊</div><div class="stat-num">${prescs.length}</div><div class="stat-lbl">Prescriptions</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#FFFBEB">📄</div><div class="stat-num">${reports.length}</div><div class="stat-lbl">Reports</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#FFF0F0">⏰</div><div class="stat-num">${reminders.filter(r=>r.is_active).length}</div><div class="stat-lbl">Reminders</div></div>`;

      const upList = document.getElementById('upcoming-list');
      if (!upcoming.length) {
        upList.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">No upcoming appointments</div><div class="empty-sub"><a href="appointments.html" style="color:var(--green)">Book one now</a></div></div>';
      } else {
        upList.innerHTML = upcoming.slice(0,4).map(a => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border2)">
            <div>
              <div style="font-size:13.5px;font-weight:600">${escHtml(a.doctor_name)}</div>
              <div style="font-size:12px;color:var(--text2)">${escHtml(a.specialty)} · ${fmtDate(a.date)} at ${fmtTime(a.time)}</div>
            </div>${statusBadge(a.status)}
          </div>`).join('');
      }

      document.getElementById('side-title').textContent = 'Medicine reminders';
      const active = reminders.filter(r => r.is_active);
      if (!active.length) {
        document.getElementById('side-list').innerHTML = '<div class="empty-state"><div class="empty-icon">⏰</div><div class="empty-text">No active reminders</div></div>';
      } else {
        document.getElementById('side-list').innerHTML = active.slice(0,5).map(r => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border2)">
            <div>
              <div style="font-size:13.5px;font-weight:600">${escHtml(r.medicine_name)}</div>
              <div style="font-size:12px;color:var(--text2)">${r.dosage} · ${fmtTime(r.reminder_time)} · ${r.frequency}</div>
            </div>
            <span class="badge badge-green">Active</span>
          </div>`).join('');
      }
    } else {
      // doctor
      const [appts, patients] = await Promise.all([
        apiFetch('/appointments/'),
        apiFetch('/doctors/patients')
      ]);
      const pending = appts.filter(a => a.status === 'pending');
      const today = new Date().toISOString().split('T')[0];
      const todayAppts = appts.filter(a => a.date === today);
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-icon" style="background:#F0FAF6">📅</div><div class="stat-num">${appts.length}</div><div class="stat-lbl">Total appointments</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#FFFBEB">⏳</div><div class="stat-num">${pending.length}</div><div class="stat-lbl">Pending review</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#EFF6FF">👥</div><div class="stat-num">${patients.length}</div><div class="stat-lbl">My patients</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#F5F3FF">📋</div><div class="stat-num">${todayAppts.length}</div><div class="stat-lbl">Today's schedule</div></div>`;

      const upList = document.getElementById('upcoming-list');
      const upcoming = appts.filter(a => a.status !== 'cancelled').slice(0,4);
      if (!upcoming.length) {
        upList.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">No appointments yet</div></div>';
      } else {
        upList.innerHTML = upcoming.map(a => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border2)">
            <div>
              <div style="font-size:13.5px;font-weight:600">${escHtml(a.patient_name||'Patient')}</div>
              <div style="font-size:12px;color:var(--text2)">${fmtDate(a.date)} at ${fmtTime(a.time)}</div>
            </div>${statusBadge(a.status)}
          </div>`).join('');
      }

      document.getElementById('side-title').textContent = 'My patients';
      if (!patients.length) {
        document.getElementById('side-list').innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">No patients yet</div></div>';
      } else {
        document.getElementById('side-list').innerHTML = patients.slice(0,5).map(p => `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2)">
            <div class="avatar" style="width:32px;height:32px;font-size:13px">${(p.name||'P')[0].toUpperCase()}</div>
            <div>
              <div style="font-size:13.5px;font-weight:600">${escHtml(p.name)}</div>
              <div style="font-size:12px;color:var(--text2)">${p.phone||p.email}</div>
            </div>
          </div>`).join('');
      }
    }
  } catch(e) { showToast('Failed to load dashboard: '+e.message,'error'); }
}
loadDashboard();
</script>
</body>
</html>
